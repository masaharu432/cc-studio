<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Screens</title>
<style>
  :root{
    --chassis:#11151C; --module:#1B222E; --line:#2A3342; --ink:#E8EDF4; --dim:#7C8694;
    --brand:#2E90E8; --brand-soft:#8FC2F2; --live:#3FD79A; --live-dim:#1f6d52;
    --sans:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"Roboto Mono","JetBrains Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--chassis);color:var(--ink);font-family:var(--sans)}
  .screen{height:100%;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;gap:10px;padding:16px 16px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;
    padding-top:calc(16px + env(safe-area-inset-top))}
  .wordmark{font:600 13px/1 var(--mono);letter-spacing:.14em;display:inline-flex;align-items:center;color:var(--ink)}
  .wordmark i{color:var(--brand);margin:0 4px;font-style:normal}
  .title{font:600 13px/1 var(--mono);letter-spacing:.24em;color:var(--dim);text-transform:uppercase}
  .build{margin-left:auto;font:500 10px/1 var(--mono);color:var(--brand-soft);background:#0e1620;
    border:1px solid var(--line);padding:6px 8px;border-radius:7px;white-space:nowrap}
  .summary{padding:11px 18px 2px;font:500 11px/1 var(--mono);color:var(--dim);flex:0 0 auto}
  .summary b{color:var(--ink);font-weight:700}
  .subnote{padding:6px 18px 8px;font:500 10px/1.5 var(--mono);color:#5d6675;flex:0 0 auto}
  .sw-body{flex:1;overflow:auto;padding:4px 16px 14px;display:flex;flex-direction:column;gap:9px}
  .band-row{position:relative;overflow:hidden;border-radius:12px;flex:0 0 auto}
  .band{position:relative;display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;
    padding:12px 10px 12px 14px;background:var(--module);cursor:pointer;transition:transform .2s}
  .band .fdot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex:0 0 auto}
  .band-main{flex:1;min-width:0}
  /* フォルダ名は必ず全文表示（省略しない）。長ければ折り返してカードが縦に伸びる＝許容。 */
  .band-name{font:600 13.5px/1.3 var(--sans);color:var(--ink);overflow-wrap:anywhere}
  .band-path{font:500 10.5px/1.4 var(--mono);color:var(--dim);margin-top:5px;overflow-wrap:anywhere}
  .band.active{border-color:var(--brand);box-shadow:inset 3px 0 0 var(--brand)}
  /* 選択中は青枠で示すので行頭ドットは青くしない（busy=青パルス/接続切れ=赤 は維持）。 */
  .band .fdot.busy{background:var(--brand);animation:ccpulse 1s ease-in-out infinite}
  .band .fdot.disc{background:#e53935;box-shadow:0 0 0 3px rgba(229,57,53,.22);animation:none}
  @keyframes ccpulse{0%,100%{box-shadow:0 0 0 0 rgba(46,144,232,.55)}50%{box-shadow:0 0 0 5px rgba(46,144,232,0)}}
  .band-badge{margin-left:8px;font:600 9px/1 var(--mono);letter-spacing:.08em;padding:4px 7px;border-radius:6px;flex:0 0 auto}
  .band-badge.disc{color:#fff;background:#c0392b}
  @media (prefers-reduced-motion:reduce){.band .fdot.busy{animation:none}}
  .bicon{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:#161b24;color:var(--dim);
    font-size:15px;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;transition:background .15s,color .15s,border-color .15s}
  .bicon.reload{color:var(--brand-soft)}
  .bicon.reload.stale{background:var(--brand);border-color:#1c6fc0;color:#fff}
  .swipe-del{position:absolute;top:0;right:0;bottom:0;width:96px;border:0;cursor:pointer;border-radius:12px;
    background:linear-gradient(180deg,#8f2f27,#722019);color:#fff;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;font:600 12.5px/1 var(--sans)}
  .swipe-del .x{font-size:15px}
  .band-row.swiped .band{transform:translateX(-104px)}
  .band.new{display:flex;align-items:center;justify-content:center;border:1px dashed #33405a;border-radius:12px;background:#0e1620;
    color:var(--brand-soft);font:600 11px/1 var(--sans);letter-spacing:.04em;text-transform:uppercase;gap:8px;padding:15px 10px;cursor:pointer}
  .band.new .plus{font-size:17px}
  .dock{flex:0 0 auto;padding:11px 16px calc(13px + env(safe-area-inset-bottom));border-top:1px solid var(--line);
    background:linear-gradient(180deg,#10141b,#0c0f15);display:flex;flex-direction:column;gap:8px}
  .dock-h{font:700 9px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:#5d6675;margin:2px 2px 0}
  .band.sys{display:flex;align-items:center;gap:12px;border:1px solid #244b3f;border-radius:12px;padding:12px 12px;
    background:var(--module);box-shadow:inset 3px 0 0 var(--live);cursor:pointer}
  .band.sys .sic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;
    background:#0e1620;border:1px solid var(--line);color:var(--live);font-size:16px}
  .band.sys .anchor{flex:0 0 auto;width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--dim);
    font-size:13px;border:1px dashed #33405a}
  @media (prefers-reduced-motion:reduce){.band,.bicon{transition:none}}
</style>
</head>
<body>
  <div class="screen">
    <div class="bar">
      <span class="wordmark">CC<i>▍</i>STUDIO</span><span class="title">Screens</span>
      <span class="build" id="build"></span>
    </div>
    <div class="summary" id="summary"></div>
    <div class="sw-body" id="webList"></div>
    <div class="dock"><div class="dock-h">System</div><div id="sysList"></div>
      <div class="band sys feat" id="notifyCard">
        <div class="sic" style="color:#e9b949">🔔</div>
        <div class="band-main"><div class="band-name">通知</div></div>
        <div class="anchor" style="border:0;color:var(--brand-soft);font-size:18px">›</div>
      </div>
      <div class="band sys feat" id="logCard">
        <div class="sic" style="color:#7fd1a3">📋</div>
        <div class="band-main"><div class="band-name">ログ</div></div>
        <div class="anchor" style="border:0;color:var(--brand-soft);font-size:18px">›</div>
      </div>
    </div>
  </div>
<script>
  function api(){ return window.CCStudio || {}; }
  function el(t,c){ var e=document.createElement(t); if(c) e.className=c; return e; }
  function screensData(){ try { return JSON.parse(api().listScreens()||'[]'); } catch(_){ return []; } }

  function makeWebBand(s){
    var row=el('div','band-row');
    var del=el('button','swipe-del'); del.innerHTML='<span class="x">✕</span>削除';
    del.addEventListener('click',function(e){ e.stopPropagation(); try{ api().closeScreen(String(s.id)); }catch(_){ } });
    var band=el('div','band'+(s.active?' active':''));
    var dot=el('span','fdot');
    if(s.disconnected) dot.classList.add('disc');
    else if(s.busy) dot.classList.add('busy');
    var main=el('div','band-main');
    var nm=el('div','band-name'); nm.textContent=s.title; main.appendChild(nm);
    var pa=el('div','band-path'); pa.textContent=s.path||''; main.appendChild(pa);
    var rb=el('button','bicon reload'+(s.stale?' stale':'')); rb.textContent='⟳';
    rb.addEventListener('click',function(e){ e.stopPropagation(); onReload(s); });
    band.appendChild(dot); band.appendChild(main);
    // 処理中はドットが青くパルスするので文字バッジは出さない。接続切れは静止赤ドットなので文字も添える。
    if(s.disconnected){ var bd=el('span','band-badge disc'); bd.textContent='接続切れ'; band.appendChild(bd); }
    band.appendChild(rb);
    var x0=null;
    band.addEventListener('touchstart',function(e){ x0=e.touches[0].clientX; },{passive:true});
    band.addEventListener('touchend',function(e){
      if(x0==null) return; var dx=e.changedTouches[0].clientX-x0;
      if(dx<-40){ row.classList.add('swiped'); }
      else if(dx>40){ row.classList.remove('swiped'); }
      x0=null;
    });
    band.addEventListener('click',function(){
      if(row.classList.contains('swiped')){ row.classList.remove('swiped'); return; }
      try{ api().selectScreen(String(s.id)); }catch(_){ }
    });
    row.appendChild(del); row.appendChild(band);
    return row;
  }

  function onReload(s){
    showConfirm(s.title,
      function(){ try{ api().reloadScreen(String(s.id)); }catch(_){ } },
      function(){ try{ api().selectScreen(String(s.id)); }catch(_){ } });
  }

  function showConfirm(folder, onReloadCb, onOpenCb){
    var bd=el('div'); bd.style.cssText='position:fixed;inset:0;background:rgba(6,9,13,.66);display:flex;align-items:center;justify-content:center;padding:22px;z-index:50;';
    var dg=el('div'); dg.style.cssText='width:100%;max-width:320px;background:linear-gradient(180deg,#161d27,#11151c);border:1px solid #2A3342;border-radius:16px;padding:18px 16px 16px;';
    dg.innerHTML='<div style="font:600 16px/1.3 var(--sans);color:#E8EDF4;margin-bottom:8px;">リロードして起動しますか？</div>'+
      '<div style="font:500 12.5px/1.65 var(--sans);color:#7C8694;margin-bottom:16px;"><b style="color:#E8EDF4;">'+folder+'</b> を再読込してプラグインの変更を反映します。<span style="color:#e8b07e;">このスクリーンで実行中の処理があれば中断されます。</span></div>';
    var row=el('div'); row.style.cssText='display:flex;gap:9px;';
    var b1=el('button'); b1.textContent='そのまま開く'; b1.style.cssText='flex:1;border-radius:10px;padding:13px;border:1px solid #2A3342;background:transparent;color:#7C8694;font:600 13px var(--sans);';
    var b2=el('button'); b2.textContent='リロード'; b2.style.cssText='flex:1;border-radius:10px;padding:13px;border:1px solid #1c6fc0;background:#2E90E8;color:#fff;font:600 13px var(--sans);';
    b1.onclick=function(){ document.body.removeChild(bd); onOpenCb(); };
    b2.onclick=function(){ document.body.removeChild(bd); onReloadCb(); };
    row.appendChild(b1); row.appendChild(b2); dg.appendChild(row); bd.appendChild(dg); document.body.appendChild(bd);
  }

  function makeSysBand(s){
    var band=el('div','band sys');
    band.innerHTML='<div class="sic">⌁</div><div class="band-main"><div class="band-name">'+s.title+'</div></div><div class="anchor" style="border:0;color:var(--brand-soft);font-size:18px">›</div>';
    band.addEventListener('click',function(){ try{ api().selectScreen(String(s.id)); }catch(_){ } });
    return band;
  }

  window.__ccRenderScreens=function(){
    var data=screensData();
    var web=data.filter(function(s){return s.kind==='WEB';});
    var sys=data.filter(function(s){return s.kind!=='WEB';});
    var list=document.getElementById('webList'); list.innerHTML='';
    // New screen は一番上（スクリーンが増えても常に見えて押せるように）。
    var nw=el('div','band new'); nw.innerHTML='<span class="plus">＋</span><span>New screen</span>';
    nw.addEventListener('click',function(){ try{ api().newScreen(); }catch(_){ } });
    list.appendChild(nw);
    web.forEach(function(s){ list.appendChild(makeWebBand(s)); });
    var sysEl=document.getElementById('sysList'); sysEl.innerHTML='';
    sys.forEach(function(s){ sysEl.appendChild(makeSysBand(s)); });
    document.getElementById('summary').innerHTML='<b>'+web.length+'</b> screens';
    var b=''; try{ b=(api().getBuild&&api().getBuild())||''; }catch(_){ }
    document.getElementById('build').textContent='build '+b;
  };
  document.getElementById('notifyCard').addEventListener('click', function(){ try{ api().openNotifySettings(); }catch(_){ } });
  document.getElementById('logCard').addEventListener('click', function(){ try{ api().openLogViewer(); }catch(_){ } });
  document.addEventListener('DOMContentLoaded', window.__ccRenderScreens);
</script>
</body>
</html>
