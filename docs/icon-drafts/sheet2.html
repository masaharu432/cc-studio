<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d0e12; font-family:-apple-system,Segoe UI,Roboto,sans-serif; padding:40px; }
  .grid { display:grid; grid-template-columns:repeat(2,300px); gap:52px 56px; justify-content:center; }
  .cell { text-align:center; }
  .cell svg { width:280px; height:280px; border-radius:62px; display:block; box-shadow:0 8px 30px rgba(0,0,0,.5); }
  .lab { color:#c9ccd6; font-size:16px; margin-top:16px; font-weight:600; }
  .sub { color:#7c8090; font-size:13px; margin-top:3px; }
</style></head><body>
<div class="grid">

  <!-- A: deep blue bg, sky chevron -->
  <div class="cell">
  <svg viewBox="0 0 512 512">
    <defs><linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11131c"/><stop offset="1" stop-color="#1a2740"/></linearGradient></defs>
    <rect width="512" height="512" fill="url(#bgA)"/>
    <path d="M118 206 L182 256 L118 306" fill="none" stroke="#38BDF8" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="212" y="158" width="200" height="34" rx="17" fill="#FF6B6B"/>
    <rect x="212" y="212" width="148" height="34" rx="17" fill="#FFB454"/>
    <rect x="212" y="266" width="182" height="34" rx="17" fill="#2DD4BF"/>
    <rect x="212" y="320" width="118" height="34" rx="17" fill="#A78BFA"/>
  </svg>
  <div class="lab">A. 青背景 × 水色 &gt;</div><div class="sub">2番の配色そのまま合成</div>
  </div>

  <!-- B: purple bg, white chevron -->
  <div class="cell">
  <svg viewBox="0 0 512 512">
    <defs><linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1d2b"/><stop offset="1" stop-color="#2a1f3d"/></linearGradient></defs>
    <rect width="512" height="512" fill="url(#bgB)"/>
    <path d="M118 206 L182 256 L118 306" fill="none" stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="212" y="158" width="200" height="34" rx="17" fill="#FF6B6B"/>
    <rect x="212" y="212" width="148" height="34" rx="17" fill="#FFB454"/>
    <rect x="212" y="266" width="182" height="34" rx="17" fill="#2DD4BF"/>
    <rect x="212" y="320" width="118" height="34" rx="17" fill="#A78BFA"/>
  </svg>
  <div class="lab">B. 紫背景 × 白 &gt;</div><div class="sub">1番の背景＋白プロンプト</div>
  </div>

  <!-- C: double chevron >> -->
  <div class="cell">
  <svg viewBox="0 0 512 512">
    <defs><linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1320"/><stop offset="1" stop-color="#241433"/></linearGradient></defs>
    <rect width="512" height="512" fill="url(#bgC)"/>
    <g fill="none" stroke="#38BDF8" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
      <path d="M96 210 L150 256 L96 302"/>
      <path d="M156 210 L210 256 L156 302" opacity="0.55"/>
    </g>
    <rect x="240" y="158" width="180" height="34" rx="17" fill="#FF6B6B"/>
    <rect x="240" y="212" width="132" height="34" rx="17" fill="#FFB454"/>
    <rect x="240" y="266" width="164" height="34" rx="17" fill="#2DD4BF"/>
    <rect x="240" y="320" width="104" height="34" rx="17" fill="#A78BFA"/>
  </svg>
  <div class="lab">C. 二重 &gt;&gt;</div><div class="sub">くの字を2枚重ねて動き</div>
  </div>

  <!-- D: chevron in coral, bars cooler -->
  <div class="cell">
  <svg viewBox="0 0 512 512">
    <defs><linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12141e"/><stop offset="1" stop-color="#202a44"/></linearGradient></defs>
    <rect width="512" height="512" fill="url(#bgD)"/>
    <path d="M118 206 L182 256 L118 306" fill="none" stroke="#FFB454" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="212" y="158" width="200" height="34" rx="17" fill="#FF6B6B"/>
    <rect x="212" y="212" width="148" height="34" rx="17" fill="#FFB454"/>
    <rect x="212" y="266" width="182" height="34" rx="17" fill="#2DD4BF"/>
    <rect x="212" y="320" width="118" height="34" rx="17" fill="#A78BFA"/>
  </svg>
  <div class="lab">D. 青背景 × 黄 &gt;</div><div class="sub">プロンプトを暖色で主役に</div>
  </div>

</div>
</body></html>
